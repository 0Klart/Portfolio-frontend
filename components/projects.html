<!-- Projects Section -->
<section id="projects" aria-labelledby="projects-heading">
  <div class="container-lg">
    <div class="section-label"><span>Public Projects</span></div>
    <div class="projects-heading-row">
      <div>
        <h2 class="projects-heading" id="projects-heading">Live from GitHub</h2>
        <p class="projects-intro">
          Public repositories pulled directly from GitHub. Original work is shown first, with forks clearly labeled.
        </p>
        <p class="projects-summary" id="projects-summary">Loading public repositories...</p>
      </div>
      <a
        class="projects-profile-link"
        href="https://github.com/0Klart"
        target="_blank"
        rel="noopener noreferrer">
        View all on GitHub <i class="bi bi-arrow-up-right ms-1" aria-hidden="true"></i>
      </a>
    </div>

    <div id="github-projects" class="row g-3" aria-live="polite" aria-label="GitHub repositories">
      <div class="col-12 projects-loading">
        <div class="spinner-border spinner-border-sm me-2" role="status" aria-label="Loading projects"></div>
        Loading projects...
      </div>
    </div>
  </div>
</section>
